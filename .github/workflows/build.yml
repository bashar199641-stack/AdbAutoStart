name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Show structure
        run: find . -name "gradlew" 2>/dev/null && ls -la

      - name: Download gradlew
        run: |
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradlew -o gradlew
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AdbAutoStart
          path: app/build/outputs/apk/debug/app-debug.apk
